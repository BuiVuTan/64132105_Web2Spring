<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f9b58 0%, #1a7a4a 40%, #6a11cb 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-wrapper {
            display: flex; width: 860px; min-height: 480px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        /* Panel trái */
        .panel-left {
            flex: 1;
            background: linear-gradient(160deg, #11998e, #38ef7d 60%, #6a11cb);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; color: white; text-align: center;
        }
        .panel-left .logo { font-size: 52px; margin-bottom: 16px; }
        .panel-left h2 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        .panel-left p { font-size: 14px; opacity: 0.85; line-height: 1.6; }
        /* Panel phải */
        .panel-right {
            flex: 1; background: white;
            display: flex; flex-direction: column;
            justify-content: center; padding: 48px 40px;
        }
        .panel-right h3 {
            font-size: 24px; color: #1a1a2e; margin-bottom: 6px; font-weight: 700;
        }
        .panel-right .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: #444; margin-bottom: 7px; letter-spacing: 0.3px;
        }
        .input-wrap { position: relative; }
        .input-wrap input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e8e8e8; border-radius: 10px;
            font-size: 15px; outline: none; transition: border-color 0.2s;
            background: #fafafa;
        }
        .input-wrap input:focus {
            border-color: #11998e; background: white;
        }
        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(90deg, #11998e, #6a11cb);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            letter-spacing: 0.5px; transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .error {
            display: flex; align-items: center; gap: 8px;
            background: #fff0f0; color: #c0392b; padding: 11px 14px;
            border-radius: 8px; margin-bottom: 20px; font-size: 14px;
            border-left: 4px solid #e74c3c;
        }
        .back {
            text-align: center; margin-top: 20px; font-size: 13px; color: #aaa;
        }
        .back a {
            color: #11998e; text-decoration: none; font-weight: 600;
        }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <!-- Panel trái -->
    <div class="panel-left">
        <div class="logo">📰</div>
        <h2>ThiGK2 News</h2>
        <p>Cổng thông tin tin tức<br>hiện đại &amp; nhanh chóng</p>
    </div>
    <!-- Panel phải -->
    <div class="panel-right">
        <h3>Chào mừng trở lại!</h3>
        <p class="subtitle">Đăng nhập để tiếp tục đọc tin tức</p>

        <div class="error" th:if="${loi}">
            <span>⚠</span>
            <span th:text="${loi}"></span>
        </div>

        <form method="post" th:action="@{/dang-nhap}">
            <div class="form-group">
                <label for="tenDangNhap">Tên đăng nhập</label>
                <div class="input-wrap">
                    <input type="text" id="tenDangNhap" name="tenDangNhap"
                           placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label for="matKhau">Mật khẩu</label>
                <div class="input-wrap">
                    <input type="password" id="matKhau" name="matKhau"
                           placeholder="Nhập mật khẩu" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Đăng nhập →</button>
        </form>

        <div class="back">
            Tài khoản: <strong>admin</strong> / <strong>123456</strong>
        </div>
    </div>
</div>
</body>
</html>
