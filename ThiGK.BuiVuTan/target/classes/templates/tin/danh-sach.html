<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tieuDeTrang}">Tin tức</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg, #0f9b58, #6a11cb);
            padding: 0 32px; display: flex;
            align-items: center; justify-content: space-between;
            height: 60px; box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar-brand {
            color: white; font-size: 20px; font-weight: 700;
            text-decoration: none;
        }
        .navbar-right { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.85); font-size: 14px; }
        .btn-logout {
            background: rgba(255,255,255,0.15); color: white;
            border: 1px solid rgba(255,255,255,0.3); padding: 6px 16px;
            border-radius: 20px; text-decoration: none; font-size: 13px;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.28); }

        /* HEADER BANNER */
        .page-header {
            background: linear-gradient(90deg, #11998e, #6a11cb);
            color: white; padding: 28px 32px;
        }
        .page-header h2 { font-size: 22px; font-weight: 700; }

        /* LAYOUT */
        .container { display: flex; max-width: 1140px; margin: 28px auto; gap: 24px; padding: 0 20px; }

        /* SIDEBAR */
        .sidebar { width: 230px; flex-shrink: 0; }
        .sidebar-card {
            background: white; border-radius: 14px; overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
        }
        .sidebar-title {
            background: linear-gradient(90deg, #11998e, #38ef7d);
            color: white; padding: 14px 18px; font-weight: 700; font-size: 14px;
            letter-spacing: 0.5px;
        }
        .sidebar ul { list-style: none; padding: 10px 0; }
        .sidebar ul li a {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px; text-decoration: none; color: #444;
            font-size: 14px; transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar ul li a:hover {
            background: #f0fdf4; color: #0f9b58;
            border-left-color: #11998e;
        }
        .sidebar ul li a.active {
            background: linear-gradient(90deg, #f0fdf4, #faf5ff);
            color: #6a11cb; font-weight: 700;
            border-left-color: #6a11cb;
        }
        .sidebar ul li a .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: linear-gradient(135deg, #11998e, #6a11cb);
            flex-shrink: 0;
        }

        /* MAIN */
        .main { flex: 1; }
        .main-title {
            font-size: 20px; font-weight: 700; color: #1a1a2e;
            margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
        }
        .main-title .count {
            background: linear-gradient(90deg, #11998e, #6a11cb);
            color: white; font-size: 12px; padding: 2px 10px;
            border-radius: 20px; font-weight: 600;
        }

        /* TIN CARD */
        .tin-card {
            background: white; border-radius: 14px; padding: 20px 24px;
            margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            border-left: 4px solid transparent;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .tin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
            border-left-color: #11998e;
        }
        .tin-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .tin-card h3 { font-size: 17px; margin: 0; flex: 1; }
        .tin-card h3 a {
            text-decoration: none; color: #1a1a2e;
            transition: color 0.2s;
        }
        .tin-card:hover h3 a { color: #0f9b58; }
        .badge {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; white-space: nowrap;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
        }
        .tin-card .meta {
            font-size: 12px; color: #aaa; margin-top: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .tin-card .noi-dung {
            margin-top: 10px; color: #666; font-size: 14px; line-height: 1.6;
            border-top: 1px solid #f5f5f5; padding-top: 10px;
        }
        .read-more {
            display: inline-block; margin-top: 10px; font-size: 13px;
            color: #0f9b58; font-weight: 600; text-decoration: none;
        }
        .read-more:hover { text-decoration: underline; }

        .empty {
            text-align: center; padding: 60px 20px; color: #aaa;
            font-size: 16px; background: white; border-radius: 14px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a class="navbar-brand" th:href="@{/}">📰 ThiGK2 News</a>
    <div class="navbar-right">
        <span th:if="${session.nguoiDungDangNhap != null}">
            👤 <strong th:text="${session.nguoiDungDangNhap.hoTen}"></strong>
            <a class="btn-logout" th:href="@{/dang-xuat}">Đăng xuất</a>
        </span>
    </div>
</div>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-card">
            <div class="sidebar-title">📂 Thể loại</div>
            <ul>
                <li>
                    <a th:href="@{/tin}"
                       th:classappend="${maTheLoaiHienTai == null} ? 'active' : ''">
                        <span class="dot"></span> Tất cả
                    </a>
                </li>
                <li th:each="tl : ${danhSachTheLoai}">
                    <a th:href="@{/tin/the-loai/{id}(id=${tl.maTheLoai})}"
                       th:classappend="${maTheLoaiHienTai == tl.maTheLoai} ? 'active' : ''">
                        <span class="dot"></span>
                        <span th:text="${tl.tenTheLoai}"></span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="main-title">
            <span th:text="${tieuDeTrang}"></span>
            <span class="count" th:text="${#lists.size(danhSachTin)} + ' bài'"></span>
        </div>

        <div class="empty" th:if="${#lists.isEmpty(danhSachTin)}">
            😕 Không có tin nào trong thể loại này.
        </div>

        <div class="tin-card" th:each="tin : ${danhSachTin}">
            <div class="tin-card-top">
                <h3>
                    <a th:href="@{/tin/{id}(id=${tin.maTin})}" th:text="${tin.tieuDe}"></a>
                </h3>
                <span class="badge" th:text="${tin.theLoaiTin.tenTheLoai}"></span>
            </div>
            <div class="meta">
                🕐 <span th:text="${#temporals.format(tin.ngayDang, 'dd/MM/yyyy HH:mm')}"></span>
            </div>
            <div class="noi-dung" th:text="${#strings.abbreviate(tin.noiDung, 160)}"></div>
            <a class="read-more" th:href="@{/tin/{id}(id=${tin.maTin})}">Đọc tiếp →</a>
        </div>
    </div>
</div>

</body>
</html>
