<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif; margin: 0;
            background: #f5f5f5; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12); width: 360px;
        }
        .login-box h2 {
            text-align: center; margin: 0 0 28px;
            color: #2c3e50; font-size: 22px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 4px; font-size: 15px; outline: none;
        }
        .form-group input:focus { border-color: #2c3e50; }
        .btn-login {
            width: 100%; padding: 11px; background: #2c3e50; color: white;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer;
        }
        .btn-login:hover { background: #1a252f; }
        .error {
            background: #fdecea; color: #c0392b; padding: 10px 14px;
            border-radius: 4px; margin-bottom: 18px; font-size: 14px;
            border-left: 4px solid #c0392b;
        }
        .back { text-align: center; margin-top: 16px; font-size: 14px; }
        .back a { color: #2980b9; text-decoration: none; }
        .back a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <!-- Thông báo lỗi nếu có -->
    <div class="error" th:if="${loi}" th:text="${loi}"></div>

    <form method="post" th:action="@{/dang-nhap}">
        <div class="form-group">
            <label for="tenDangNhap">Tên đăng nhập</label>
            <input type="text" id="tenDangNhap" name="tenDangNhap"
                   placeholder="Nhập tên đăng nhập" required autofocus>
        </div>
        <div class="form-group">
            <label for="matKhau">Mật khẩu</label>
            <input type="password" id="matKhau" name="matKhau"
                   placeholder="Nhập mật khẩu" required>
        </div>
        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>

    <div class="back">
        <a th:href="@{/tin}">← Quay lại trang tin tức</a>
    </div>
</div>

</body>
</html>
